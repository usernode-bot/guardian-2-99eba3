  <script>
  (function () {
    function restoreThemeEarly() {
      const allKeys = Object.keys(localStorage);
      let theme = 'system';
      for (const key of allKeys) {
        if (key.startsWith('guardian_settings_')) {
          try {
            const settings = JSON.parse(localStorage.getItem(key));
            theme = settings.theme || 'system';
            break;
          } catch (_) {}
        }
      }

      const html = document.documentElement;
      if (theme === 'system') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
          html.classList.add('dark');
        } else {
          html.classList.remove('dark');
        }
      } else if (theme === 'dark') {
        html.classList.add('dark');
      } else if (theme === 'light') {
        html.classList.remove('dark');
      }
    }

    restoreThemeEarly();
  })();
  </script>

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

  <style>
    @keyframes slideInLeft {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOutLeft {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(-100%);
        opacity: 0;
      }
    }

    @keyframes fabPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(34, 211, 238, 0);
      }
    }

    .sidebar-enter {
      animation: slideInLeft 0.3s ease-out;
    }

    .sidebar-exit {
      animation: slideOutLeft 0.3s ease-out;
    }

    .fab-pulse {
      animation: fabPulse 2s infinite;
    }

    .message-bubble {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    /* Compact layout mode */
    .layout-compact #sidebar { font-size: 0.875rem; }
    .layout-compact #sidebar button { padding: 0.375rem 0.75rem; }
    .layout-compact #sidebarUser { padding: 0.75rem; }
    .layout-compact #sidebarUser > div { gap: 0.5rem; }
    .layout-compact #convList > div { padding: 0.75rem; }
    .layout-compact #contactsList > div { padding: 0.75rem; }
    .layout-compact #messageList { gap: 0.5rem; }
    .layout-compact #header { padding: 0.5rem 0.75rem; }
    .layout-compact #inputFooter { padding: 0.75rem; gap: 0.25rem; }
    .layout-compact nav.flex-1 { gap: 0.25rem; }
  </style>

      <div class="flex justify-between items-start">
        <h2 class="text-xl font-semibold text-zinc-900 dark:text-white">Contact QR Code</h2>
        <button onclick="hideQRCodeModal()" class="text-zinc-600 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300">✕</button>
      </div>
      <div id="qrCodeContainer" class="bg-white p-4 rounded-lg flex justify-center items-center min-h-64"></div>
      <p class="text-xs text-zinc-600 dark:text-zinc-400 text-center">Share this code so others can add you as a contact</p>
    </div>
  </div>

  <!-- Image Lightbox -->
  <div id="imageLightbox" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
    <div class="relative max-w-2xl max-h-[90vh]">
      <img id="lightboxImage" src="" alt="Message image" class="max-w-full max-h-[90vh] rounded-lg">
      <button id="closeLightbox" class="absolute top-2 right-2 bg-black/50 hover:bg-black/70 text-white w-8 h-8 rounded-full flex items-center justify-center transition">✕</button>
    </div>
  </div>

  <!-- Token Transfer Modal -->
  <div id="tokenModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-lg p-6 w-full max-w-sm space-y-4">
      <h2 class="text-xl font-semibold text-zinc-900 dark:text-white">Send Tokens</h2>
      <div class="space-y-2">
        <label class="text-sm text-zinc-600 dark:text-zinc-400">Recipient</label>
        <div id="tokenRecipient" class="px-3 py-2 bg-zinc-100 dark:bg-zinc-800 rounded-lg text-zinc-700 dark:text-zinc-300"></div>
      </div>
      <div class="space-y-2">
        <label class="text-sm text-zinc-600 dark:text-zinc-400">Amount</label>
        <input id="tokenAmount" type="number" placeholder="0" class="w-full px-3 py-2 bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-lg text-zinc-900 dark:text-zinc-100 placeholder-zinc-600 dark:placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
      </div>
      <div class="space-y-2">
        <label class="text-sm text-zinc-600 dark:text-zinc-400">Memo (optional)</label>
        <input id="tokenMemo" type="text" placeholder="Add a note..." class="w-full px-3 py-2 bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-lg text-zinc-900 dark:text-zinc-100 placeholder-zinc-600 dark:placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
      </div>
      <div class="flex gap-2">
        <button id="tokenCancel" class="flex-1 px-3 py-2 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 rounded-lg transition text-zinc-900 dark:text-zinc-100">Cancel</button>
        <button id="tokenSend" class="flex-1 px-3 py-2 bg-cyan-600 hover:bg-cyan-700 dark:hover:bg-cyan-500 text-white rounded-lg transition font-medium">Send</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const headers = token ? { 'x-usernode-token': token } : {};

    let currentUser = null;
    let currentConvId = null;
    let currentOtherId = null;
    let pollInterval = null;
    let sidebarOpen = false;

    // Settings functions
    function loadSettings() {
      if (!currentUser) return {};
      const stored = JSON.parse(localStorage.getItem(`guardian_settings_${currentUser.id}`) || '{}');
      return {
        theme: stored.theme || 'system',
        layout: stored.layout || 'comfortable',
        fabVisible: stored.fabVisible !== undefined ? stored.fabVisible : false,
        findContactsVisible: stored.findContactsVisible !== undefined ? stored.findContactsVisible : true,
      };
    }

    function saveSettings(settings) {
      if (!currentUser) return;
      localStorage.setItem(`guardian_settings_${currentUser.id}`, JSON.stringify(settings));
    }

    function initSettings() {
      const settings = loadSettings();
      applyTheme(settings.theme);
      applyLayout(settings.layout);
      applyFabVisibility(settings.fabVisible);
      applyFindContactsVisibility(settings.findContactsVisible);
      document.getElementById('themeSelect').value = settings.theme;
      document.getElementById('fabToggle').checked = settings.fabVisible;
      document.getElementById('findContactsToggle').checked = settings.findContactsVisible;
      updateLayoutButtons(settings.layout);
      // Setup system theme listener
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (loadSettings().theme === 'system') {
          applyTheme('system');
        }
      });
    }

    function applyTheme(theme) {
      const settings = loadSettings();
      settings.theme = theme;
      const html = document.documentElement;

      if (theme === 'system') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
          html.classList.add('dark');
        } else {
          html.classList.remove('dark');
        }
      } else if (theme === 'dark') {
        html.classList.add('dark');
      } else if (theme === 'light') {
        html.classList.remove('dark');
      }

      saveSettings(settings);
    }

    function applyLayout(layout) {
      const settings = loadSettings();
      settings.layout = layout;
      document.body.classList.toggle('layout-compact', layout === 'compact');
      document.body.classList.toggle('layout-comfortable', layout === 'comfortable');
      updateLayoutButtons(layout);
      saveSettings(settings);
    }

    function applyFabVisibility(visible) {
      const settings = loadSettings();
      settings.fabVisible = typeof visible === 'boolean' ? visible : document.getElementById('fabToggle').checked;
      const fab = document.getElementById('fabBtn');
      if (fab) {
        fab.classList.toggle('hidden', !settings.fabVisible);
      }
      saveSettings(settings);
    }

    function applyFindContactsVisibility(visible) {
      const settings = loadSettings();
      settings.findContactsVisible = typeof visible === 'boolean' ? visible : document.getElementById('findContactsToggle').checked;
      const btn = document.getElementById('findContactsBtn');
      if (btn) {
        btn.classList.toggle('hidden', !settings.findContactsVisible);
      }
      saveSettings(settings);
    }

    function updateLayoutButtons(layout) {
      const comfortable = document.getElementById('layoutComfort');
      const compact = document.getElementById('layoutCompact');
      if (layout === 'comfortable') {
        comfortable.classList.add('border-cyan-600', 'dark:border-cyan-500');
        comfortable.classList.remove('border-transparent');
        compact.classList.remove('border-cyan-600', 'dark:border-cyan-500');
        compact.classList.add('border-transparent');
      } else {
        compact.classList.add('border-cyan-600', 'dark:border-cyan-500');
        compact.classList.remove('border-transparent');
        comfortable.classList.remove('border-cyan-600', 'dark:border-cyan-500');
        comfortable.classList.add('border-transparent');
      }
    }

    function openSettingsPanel() {
      document.getElementById('sidebar').classList.add('hidden');
      document.getElementById('settingsPanel').classList.remove('hidden');
      sidebarOpen = false;
    }

    function closeSettingsPanel() {
      document.getElementById('settingsPanel').classList.add('hidden');
      document.getElementById('sidebar').classList.remove('hidden');
    }

    async function apiCall(path, opts = {}) {
      const response = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...headers, ...opts.headers }
      });
      if (response.status === 401) {
        alert('Not authenticated');
        return null;
      }
      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        return { error: data.error || 'Request failed', status: response.status };
      }
      return response.json();
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      if (sidebarOpen) {
        sidebar.classList.remove('hidden');
        overlay.classList.remove('hidden');
        setTimeout(() => {
          sidebar.classList.add('sidebar-enter');
          overlay.style.opacity = '1';
        }, 0);
      } else {
        sidebar.classList.add('sidebar-exit');
        overlay.style.opacity = '0';
        setTimeout(() => {
          sidebar.classList.add('hidden');
          overlay.classList.add('hidden');
          sidebar.classList.remove('sidebar-enter', 'sidebar-exit');
        }, 300);
      }
    }

    async function init() {
      const user = await apiCall('/api/user');
      if (!user) {
        console.error('Failed to load user');
        return;
      }
      currentUser = user;
      document.getElementById('sidebarUsername').textContent = user.username + (user.verified ? ' ✓' : '');
      document.getElementById('sidebarWallet').textContent = user.usernode_pubkey || 'No wallet linked';
      initSettings();
      loadConversations();
      setupEventListeners();
    }

    function setupEventListeners() {
      document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
      document.getElementById('backBtn').addEventListener('click', () => {
        currentConvId = null;
        showConversationsView();
      });

      document.getElementById('searchInput').addEventListener('input', (e) => searchUsers(e.target.value));

      document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('imageBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => handleImageUpload(e.target.files[0]);
        input.click();
      });

      document.getElementById('tokenBtn').addEventListener('click', showTokenModal);
      document.getElementById('tokenCancel').addEventListener('click', hideTokenModal);
      document.getElementById('tokenSend').addEventListener('click', sendToken);

      document.getElementById('closeLightbox').addEventListener('click', () => {
        document.getElementById('imageLightbox').classList.add('hidden');
      });

      document.getElementById('imageLightbox').addEventListener('click', (e) => {
        if (e.target === document.getElementById('imageLightbox')) {
          document.getElementById('imageLightbox').classList.add('hidden');
        }
      });

      document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
    }

    async function loadConversations() {
      const data = await apiCall('/api/conversations');
      const sentData = await apiCall('/api/conversation-requests/sent');
      if (!data) return;

      const list = document.getElementById('convList');
      let html = '';

      // Add sent requests
      if (sentData && sentData.requests && sentData.requests.length > 0) {
        const pendingRequests = sentData.requests.filter(r => r.status === 'pending');
        if (pendingRequests.length > 0) {
          html += '<div class="bg-zinc-200 dark:bg-zinc-800 text-xs text-zinc-600 dark:text-zinc-400 px-4 py-2 font-semibold sticky top-0 z-10">Pending Requests</div>';
          html += pendingRequests.map(req => `
            <div class="p-4 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
              <div class="flex justify-between items-start gap-2">
                <div class="flex-1 min-w-0">
                  <div class="font-medium truncate text-zinc-900 dark:text-zinc-100">${req.recipientUsername} <span class="text-sm text-zinc-600 dark:text-zinc-500">✓</span></div>
                  <div class="text-xs text-zinc-600 dark:text-zinc-500 truncate">${req.recipientWallet || 'No wallet'}</div>
                  <div class="text-xs text-zinc-600 dark:text-zinc-400 mt-1">Awaiting response</div>
                </div>
                <button onclick="cancelRequest(${req.id})" class="text-zinc-600 dark:text-zinc-500 hover:text-red-600 dark:hover:text-red-400 text-xs">Cancel</button>
              </div>
            </div>
          `).join('');
        }
      }

      // Add active conversations
      if (data.conversations.length === 0 && (!sentData || !sentData.requests || sentData.requests.length === 0)) {
        list.innerHTML = '<div class="text-center py-8 text-zinc-600 dark:text-zinc-500">No conversations yet. <br>Tap the + button to discover contacts.</div>';
        return;
      }

      if (data.conversations.length > 0) {
        if (html) html += '<div class="bg-zinc-200 dark:bg-zinc-800 text-xs text-zinc-600 dark:text-zinc-400 px-4 py-2 font-semibold sticky top-0 z-10">Conversations</div>';
        html += data.conversations.map(conv => `
          <div class="p-4 hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition" onclick="openConversation(${conv.id}, ${conv.otherId}, '${conv.username}')">
            <div class="flex justify-between items-start gap-2">
              <div class="flex-1 min-w-0">
                <div class="font-medium truncate text-zinc-900 dark:text-zinc-100">${conv.username} <span class="text-sm text-zinc-600 dark:text-zinc-500">✓</span></div>
                <div class="text-xs text-zinc-600 dark:text-zinc-500 truncate">${conv.usernode_pubkey || 'No wallet'}</div>
                <div class="text-sm text-zinc-600 dark:text-zinc-400 truncate">${conv.lastMessage || 'No messages'}</div>
              </div>
              <div class="text-xs text-zinc-600 dark:text-zinc-500 text-right flex-shrink-0">
                ${conv.lastMessageAt ? formatTime(new Date(conv.lastMessageAt)) : ''}
                ${conv.unreadCount > 0 ? `<div class="mt-1 inline-block px-2 py-0.5 bg-cyan-600 rounded-full text-white text-xs">${conv.unreadCount}</div>` : ''}
              </div>
            </div>
          </div>
        `).join('');
      }

      list.innerHTML = html;
    }

    async function cancelRequest(requestId) {
      const data = await apiCall(`/api/conversation-requests/${requestId}/cancel`, {
        method: 'POST',
        body: JSON.stringify({})
      });

      if (data) {
        loadConversations();
      }
    }

    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return 'now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
      return Math.floor(diff / 86400000) + 'd';
    }

    async function openConversation(convId, otherId, username) {
      currentConvId = convId;
      currentOtherId = otherId;
      document.getElementById('headerTitle').textContent = username + ' ✓';
      document.getElementById('backBtn').classList.remove('hidden');
      document.getElementById('menuBtn').classList.add('hidden');
      showChatView();
      loadMessages();

      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!currentConvId) return;
      const data = await apiCall(`/api/conversations/${currentConvId}?limit=50`);
      if (!data) return;

      const list = document.getElementById('messageList');

      if (data.error) {
        if (data.status === 403) {
          list.innerHTML = '<div class="text-center text-red-600 dark:text-red-400 py-8"><div class="text-sm">This conversation is no longer available</div></div>';
        } else {
          list.innerHTML = '<div class="text-center text-red-600 dark:text-red-400 py-8"><div class="text-sm">Failed to load messages</div><button onclick="loadMessages()" class="mt-2 px-3 py-1 bg-zinc-300 dark:bg-zinc-700 hover:bg-zinc-400 dark:hover:bg-zinc-600 rounded text-xs text-zinc-900 dark:text-zinc-100">Retry</button></div>';
        }
        return;
      }

      if (data.messages.length === 0) {
        list.innerHTML = '<div class="text-center text-zinc-600 dark:text-zinc-500 py-4">No messages yet</div>';
        return;
      }

      list.innerHTML = data.messages.map(msg => renderMessage(msg)).join('');
      list.scrollTop = list.scrollHeight;

      await apiCall(`/api/conversations/${currentConvId}/read`, {
        method: 'PUT',
        body: JSON.stringify({ readUpTo: new Date().toISOString() })
      });
    }

    function renderMessage(msg) {
      const isOwn = msg.senderId === currentUser.id;
      const baseClass = isOwn ? 'ml-auto bg-cyan-600 dark:bg-cyan-600 text-white' : 'mr-auto bg-zinc-200 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100';
      const alignClass = isOwn ? 'justify-end' : 'justify-start';

      if (msg.type === 'text') {
        const blockchainStatusHtml = msg.blockchainRecorded ? `<div class="text-xs mt-2 text-amber-600 dark:text-amber-400" id="blockchain-status-${msg.id}">⏳ Recording on blockchain...</div>` : '';
        return `
          <div class="flex ${alignClass}">
            <div class="max-w-xs px-4 py-2 rounded-2xl ${baseClass} message-bubble">
              <div class="text-xs opacity-80 ${isOwn ? 'text-cyan-100' : 'text-zinc-600 dark:text-zinc-300'} mb-1">${msg.senderUsername}</div>
              <div>${msg.content.text}</div>
              <div class="text-xs mt-2 opacity-70">${formatTime(new Date(msg.createdAt))}</div>
              ${blockchainStatusHtml}
            </div>
          </div>
        `;
      }

      if (msg.type === 'image') {
        return `
          <div class="flex ${alignClass}">
            <div class="max-w-xs rounded-2xl overflow-hidden ${baseClass}">
              <img src="${msg.content.imageUrl}" alt="Message image" class="max-w-xs cursor-pointer hover:opacity-80 transition" onclick="showLightbox('${msg.content.imageUrl}')">
              <div class="text-xs px-4 py-2 opacity-80 ${isOwn ? 'text-cyan-100' : 'text-zinc-600 dark:text-zinc-300'}">${msg.senderUsername}</div>
            </div>
          </div>
        `;
      }

      if (msg.type === 'token') {
        const c = msg.content;
        const blockchainStatusHtml = msg.blockchainRecorded ? `<div class="text-xs mt-2 text-amber-600 dark:text-amber-400" id="blockchain-status-${msg.id}">⏳ Recording on blockchain...</div>` : '';
        return `
          <div class="flex ${alignClass}">
            <div class="max-w-xs px-4 py-2 rounded-2xl ${baseClass} border-2 border-yellow-500/40 message-bubble">
              <div class="text-xs mb-1 ${isOwn ? 'text-cyan-100' : 'text-zinc-600 dark:text-zinc-300'}">💰 Token Transfer</div>
              <div class="font-bold text-lg">${c.amount} tokens</div>
              <div class="text-xs mt-1 ${isOwn ? 'text-cyan-100' : 'text-zinc-600 dark:text-zinc-300'}">${c.memo || 'No memo'}</div>
              <div class="text-xs mt-2 font-medium">${c.status === 'confirmed' ? '✓ Confirmed' : '⏳ Pending'}</div>
              <div class="text-xs mt-1 opacity-70">${formatTime(new Date(msg.createdAt))}</div>
              ${blockchainStatusHtml}
            </div>
          </div>
        `;
      }

      return '';
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !currentConvId) return;

      input.value = '';
      const recordOnBlockchain = document.getElementById('blockchainToggle').checked;
      const data = await apiCall(`/api/conversations/${currentConvId}/messages`, {
        method: 'POST',
        body: JSON.stringify({ type: 'text', content: { text }, recordOnBlockchain })
      });

      if (data) {
        loadMessages();
        if (data.blockchainRecordingId) {
          pollBlockchainStatus(data.blockchainRecordingId, data.id);
        }
      }
    }

    async function handleImageUpload(file) {
      if (!file || !currentConvId) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const dataUri = e.target.result;
        const data = await apiCall(`/api/conversations/${currentConvId}/messages`, {
          method: 'POST',
          body: JSON.stringify({ type: 'image', content: { imageUrl: dataUri } })
        });
        if (data) loadMessages();
      };
      reader.readAsDataURL(file);
    }

    function showTokenModal() {
      apiCall(`/api/users/${currentOtherId}`).then(u => {
        document.getElementById('tokenRecipient').textContent = u ? u.username : 'Unknown';
      });
      document.getElementById('tokenModal').classList.remove('hidden');
    }

    function hideTokenModal() {
      document.getElementById('tokenModal').classList.add('hidden');
      document.getElementById('tokenAmount').value = '';
      document.getElementById('tokenMemo').value = '';
    }

    async function sendToken() {
      const amount = document.getElementById('tokenAmount').value;
      if (!amount || !currentConvId || !currentOtherId) return;

      const recordOnBlockchain = document.getElementById('blockchainToggle').checked;
      const data = await apiCall('/api/tokens/send', {
        method: 'POST',
        body: JSON.stringify({ recipientId: currentOtherId, amount: parseInt(amount), memo: document.getElementById('tokenMemo').value, recordOnBlockchain })
      });

      if (data) {
        const msgData = await apiCall(`/api/conversations/${currentConvId}/messages`, {
          method: 'POST',
          body: JSON.stringify({
            type: 'token',
            content: { recipientId: currentOtherId, amount: parseInt(amount), memo: document.getElementById('tokenMemo').value, txHash: data.txHash, status: data.status },
            recordOnBlockchain
          })
        });
        if (msgData && data.blockchainRecordingId) {
          pollBlockchainStatus(data.blockchainRecordingId, msgData.id);
        }
        hideTokenModal();
        loadMessages();
      }
    }

    function showLightbox(imageUrl) {
      document.getElementById('lightboxImage').src = imageUrl;
      document.getElementById('imageLightbox').classList.remove('hidden');
    }

    async function pollBlockchainStatus(auditLogId, messageId) {
      let isComplete = false;
      const maxAttempts = 20;
      let attempt = 0;

      while (!isComplete && attempt < maxAttempts) {
        attempt++;
        await new Promise(resolve => setTimeout(resolve, 1000));

        const auditData = await apiCall(`/api/blockchain-audit/${auditLogId}`);
        if (!auditData) continue;

        const statusEl = document.getElementById(`blockchain-status-${messageId}`);
        if (!statusEl) break;

        if (auditData.status === 'confirmed') {
          statusEl.innerHTML = `✓ On blockchain | <span class="font-mono text-xs">${auditData.txHash.substring(0, 10)}...</span>`;
          statusEl.classList.remove('text-amber-600', 'dark:text-amber-400');
          statusEl.classList.add('text-green-600', 'dark:text-green-400');
          isComplete = true;
        } else if (auditData.status === 'failed') {
          statusEl.innerHTML = `✗ Recording failed`;
          statusEl.classList.remove('text-amber-600', 'dark:text-amber-400');
          statusEl.classList.add('text-red-600', 'dark:text-red-400');
          isComplete = true;
        }
      }
    }

    async function searchUsers(query) {
      if (!query.trim()) {
        document.getElementById('searchResults').innerHTML = '';
        return;
      }

      const data = await apiCall(`/api/search/users?q=${encodeURIComponent(query)}`);
      if (!data) return;

      const results = document.getElementById('searchResults');
      if (data.users.length === 0) {
        results.innerHTML = '<div class="text-center text-zinc-600 dark:text-zinc-500 py-4">No users found</div>';
        return;
      }

      results.innerHTML = data.users.map(user => `
        <div class="p-4 bg-zinc-200 dark:bg-zinc-800 rounded-lg hover:bg-zinc-300 dark:hover:bg-zinc-700 transition">
          <div class="font-medium text-cyan-600 dark:text-cyan-400">${user.username} ${user.verified ? '✓' : ''}</div>
          <div class="text-xs text-zinc-600 dark:text-zinc-500 mt-1">${user.usernode_pubkey || 'No wallet'}</div>
          <div class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">${user.mutualCount} mutual connections</div>
          <button onclick="sendConversationRequest(${user.id}, '${user.username}')" class="mt-3 w-full px-3 py-2 bg-cyan-600 hover:bg-cyan-700 dark:hover:bg-cyan-500 text-white text-sm rounded-lg transition font-medium">Send Request</button>
        </div>
      `).join('');
    }

    async function startConversation(userId, username) {
      const data = await apiCall('/api/conversations', {
        method: 'POST',
        body: JSON.stringify({ participantId: userId })
      });

      if (data && !data.error) {
        openConversation(data.id, userId, username);
      } else if (data && data.error) {
        console.error('Error starting conversation:', data.error);
      }
    }

    async function sendConversationRequest(userId, username) {
      const data = await apiCall('/api/conversation-requests', {
        method: 'POST',
        body: JSON.stringify({ recipientId: userId })
      });

      if (data && !data.error) {
        alert(`Conversation request sent to ${username}`);
        showDiscoverView();
      } else if (data && data.error) {
        alert('Failed to send request: ' + data.error);
      }
    }

    function showConversationsView() {
      document.getElementById('conversationsView').classList.remove('hidden');
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('discoverView').classList.add('hidden');
      document.getElementById('inputFooter').classList.add('hidden');
      document.getElementById('headerTitle').textContent = 'Guardian';
      document.getElementById('backBtn').classList.add('hidden');
      document.getElementById('menuBtn').classList.remove('hidden');
      if (pollInterval) clearInterval(pollInterval);
      showConversationsTab();
    }

    function showConversationsTab() {
      document.getElementById('convList').classList.remove('hidden');
      document.getElementById('requestList').classList.add('hidden');
      document.getElementById('convTab').classList.add('border-cyan-600', 'dark:border-cyan-500', 'text-cyan-600', 'dark:text-cyan-400');
      document.getElementById('convTab').classList.remove('border-transparent', 'text-zinc-600', 'dark:text-zinc-400', 'hover:text-zinc-800', 'dark:hover:text-zinc-200');
      document.getElementById('reqTab').classList.remove('border-cyan-600', 'dark:border-cyan-500', 'text-cyan-600', 'dark:text-cyan-400');
      document.getElementById('reqTab').classList.add('border-transparent', 'text-zinc-600', 'dark:text-zinc-400', 'hover:text-zinc-800', 'dark:hover:text-zinc-200');
      loadConversations();
    }

    function showRequestsTab() {
      document.getElementById('convList').classList.add('hidden');
      document.getElementById('requestList').classList.remove('hidden');
      document.getElementById('convTab').classList.remove('border-cyan-600', 'dark:border-cyan-500', 'text-cyan-600', 'dark:text-cyan-400');
      document.getElementById('convTab').classList.add('border-transparent', 'text-zinc-600', 'dark:text-zinc-400', 'hover:text-zinc-800', 'dark:hover:text-zinc-200');
      document.getElementById('reqTab').classList.add('border-cyan-600', 'dark:border-cyan-500', 'text-cyan-600', 'dark:text-cyan-400');
      document.getElementById('reqTab').classList.remove('border-transparent', 'text-zinc-600', 'dark:text-zinc-400', 'hover:text-zinc-800', 'dark:hover:text-zinc-200');
      loadRequestsTab();
    }

    async function loadRequestsTab() {
      const data = await apiCall('/api/conversation-requests/received');
      if (!data) return;

      const list = document.getElementById('requestList');
      const badge = document.getElementById('requestBadge');

      if (data.requests.length === 0) {
        list.innerHTML = '<div class="text-center py-8 text-zinc-600 dark:text-zinc-500">No pending requests</div>';
        badge.classList.add('hidden');
        return;
      }

      badge.textContent = data.requests.length;
      badge.classList.remove('hidden');

      list.innerHTML = data.requests.map(req => `
        <div class="p-4 hover:bg-zinc-100 dark:hover:bg-zinc-900 transition">
          <div class="flex justify-between items-start gap-2 mb-3">
            <div class="flex-1 min-w-0">
              <div class="font-medium text-zinc-900 dark:text-zinc-100">${req.senderUsername} <span class="text-sm text-zinc-600 dark:text-zinc-500">✓</span></div>
              <div class="text-xs text-zinc-600 dark:text-zinc-500 truncate">${req.senderWallet || 'No wallet'}</div>
              <div class="text-xs text-zinc-600 dark:text-zinc-400 mt-1">${formatTime(new Date(req.createdAt))}</div>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="acceptRequest(${req.id})" class="flex-1 px-3 py-2 bg-cyan-600 hover:bg-cyan-700 dark:hover:bg-cyan-500 text-white text-sm rounded-lg transition font-medium">Accept</button>
            <button onclick="rejectRequest(${req.id})" class="flex-1 px-3 py-2 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 text-zinc-900 dark:text-zinc-200 text-sm rounded-lg transition">Reject</button>
          </div>
        </div>
      `).join('');
    }

    async function acceptRequest(requestId) {
      const data = await apiCall(`/api/conversation-requests/${requestId}/accept`, {
        method: 'POST',
        body: JSON.stringify({})
      });

      if (data && data.conversationId) {
        loadRequestsTab();
        const convData = await apiCall(`/api/conversations/${data.conversationId}`);
        if (convData && !convData.error) {
          const requests = await apiCall('/api/conversation-requests/sent');
          showConversationsTab();
        }
      }
    }

    async function rejectRequest(requestId) {
      const data = await apiCall(`/api/conversation-requests/${requestId}/reject`, {
        method: 'POST',
        body: JSON.stringify({})
      });

      if (data) {
        loadRequestsTab();
      }
    }

    function showChatView() {
      document.getElementById('conversationsView').classList.add('hidden');
      document.getElementById('chatView').classList.remove('hidden');
      document.getElementById('discoverView').classList.add('hidden');
      document.getElementById('inputFooter').classList.remove('hidden');
    }

    function showContactsView() {
      document.getElementById('conversationsView').classList.add('hidden');
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('discoverView').classList.add('hidden');
      document.getElementById('contactsView').classList.remove('hidden');
      document.getElementById('inputFooter').classList.add('hidden');
      document.getElementById('headerTitle').textContent = 'Contacts';
      document.getElementById('backBtn').classList.remove('hidden');
      document.getElementById('menuBtn').classList.add('hidden');
      loadContacts();
    }

    function showDiscoverView() {
      document.getElementById('conversationsView').classList.add('hidden');
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('discoverView').classList.remove('hidden');
      document.getElementById('contactsView').classList.add('hidden');
      document.getElementById('inputFooter').classList.add('hidden');
      document.getElementById('headerTitle').textContent = 'Find contacts';
      document.getElementById('backBtn').classList.remove('hidden');
      document.getElementById('menuBtn').classList.add('hidden');
      document.getElementById('searchInput').focus();
    }

    // ===== CONTACTS FUNCTIONS =====

    async function loadContacts() {
      const data = await apiCall('/api/contacts');
      if (!data) return;

      const list = document.getElementById('contactsList');
      if (data.contacts.length === 0) {
        list.innerHTML = '<div class="text-center py-8 text-zinc-600 dark:text-zinc-500">No contacts yet.<br>Tap "Find Contacts" to add someone.</div>';
        return;
      }

      list.innerHTML = data.contacts.map(contact => `
        <div class="p-4 hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition flex justify-between items-center group" onclick="startConversationWithContact(${contact.userId}, '${contact.username}')">
          <div class="flex-1 min-w-0">
            <div class="font-medium text-zinc-900 dark:text-zinc-100">${contact.username} ${contact.verified ? '<span class="text-sm text-zinc-600 dark:text-zinc-500">✓</span>' : ''}</div>
            ${contact.nickname ? `<div class="text-xs text-cyan-600 dark:text-cyan-400 truncate">${contact.nickname}</div>` : ''}
            <div class="text-xs text-zinc-600 dark:text-zinc-500 truncate">${contact.usernode_pubkey || 'No wallet'}</div>
          </div>
          <button onclick="deleteContactUI(${contact.id}, event)" class="text-zinc-600 dark:text-zinc-500 hover:text-red-600 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 transition ml-2" title="Delete contact">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      `).join('');
    }

    async function addContact() {
      const address = document.getElementById('addContactAddress').value.trim();
      const nickname = document.getElementById('addContactNickname').value.trim();

      if (!address) {
        alert('Please enter a Usernode address');
        return;
      }

      if (!address.startsWith('ut1')) {
        alert('Address must start with ut1');
        return;
      }

      const data = await apiCall('/api/contacts', {
        method: 'POST',
        body: JSON.stringify({ usernode_pubkey: address, nickname: nickname || null })
      });

      if (!data) return;

      const contacts = JSON.parse(localStorage.getItem(`guardian_contacts_${currentUser.id}`) || '[]');
      contacts.push(data);
      localStorage.setItem(`guardian_contacts_${currentUser.id}`, JSON.stringify(contacts));

      await startConversation(data.userId, data.username);
      document.getElementById('addContactAddress').value = '';
      document.getElementById('addContactNickname').value = '';
    }

    async function deleteContactUI(contactId, event) {
      event.stopPropagation();
      if (!confirm('Delete this contact?')) return;

      const data = await apiCall(`/api/contacts/${contactId}`, {
        method: 'DELETE'
      });

      if (data) {
        const contacts = JSON.parse(localStorage.getItem(`guardian_contacts_${currentUser.id}`) || '[]');
        const filtered = contacts.filter(c => c.id !== contactId);
        localStorage.setItem(`guardian_contacts_${currentUser.id}`, JSON.stringify(filtered));
        loadContacts();
      }
    }

    async function startConversationWithContact(userId, username) {
      const data = await apiCall('/api/conversations', {
        method: 'POST',
        body: JSON.stringify({ participantId: userId })
      });

      if (data) {
        openConversation(data.id, userId, username);
      }
    }

    async function showShareContactModal() {
      const data = await apiCall('/api/user/contact-info');
      if (!data) return;

      document.getElementById('shareContactUsername').textContent = data.username + (data.verified ? ' ✓' : '');
      document.getElementById('shareContactAddress').textContent = data.usernode_pubkey || 'No wallet linked';
      window.currentShareLink = data.shareLink;
      window.currentShareAddress = data.usernode_pubkey;

      document.getElementById('shareContactModal').classList.remove('hidden');
    }

    function hideShareContactModal() {
      document.getElementById('shareContactModal').classList.add('hidden');
    }

    function copyContactAddress() {
      if (window.currentShareAddress) {
        navigator.clipboard.writeText(window.currentShareAddress);
        alert('Address copied!');
      }
    }

    function copyContactLink() {
      if (window.currentShareLink) {
        navigator.clipboard.writeText(window.currentShareLink);
        alert('Link copied!');
      }
    }

    function showQRCodeModal() {
      document.getElementById('qrModal').classList.remove('hidden');
      document.getElementById('shareContactModal').classList.add('hidden');

      const container = document.getElementById('qrCodeContainer');
      container.innerHTML = '';

      setTimeout(() => {
        new QRCode(container, {
          text: window.currentShareLink,
          width: 200,
          height: 200,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
      }, 100);
    }

    function hideQRCodeModal() {
      document.getElementById('qrModal').classList.add('hidden');
      showShareContactModal();
    }

    init();
  </script>
</body>
</html>
