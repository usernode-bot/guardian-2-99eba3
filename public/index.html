<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Guardian</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    @keyframes slideInLeft {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOutLeft {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(-100%);
        opacity: 0;
      }
    }

    @keyframes fabPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(34, 211, 238, 0);
      }
    }

    .sidebar-enter {
      animation: slideInLeft 0.3s ease-out;
    }

    .sidebar-exit {
      animation: slideOutLeft 0.3s ease-out;
    }

    .fab-pulse {
      animation: fabPulse 2s infinite;
    }

    .message-bubble {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">
  <div id="app" class="flex flex-col flex-1 relative h-screen overflow-hidden">
    <!-- Header -->
    <div id="header" class="bg-zinc-900 border-b border-zinc-800 px-4 py-3 flex items-center gap-3 sticky top-0 z-40">
      <button id="menuBtn" class="text-cyan-400 hover:text-cyan-300 transition" title="Toggle sidebar">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <button id="backBtn" class="text-sm text-cyan-400 hover:text-cyan-300 hidden transition">← Back</button>
      <h1 id="headerTitle" class="text-lg font-semibold flex-1">Guardian</h1>
      <div id="headerRight" class="text-sm text-zinc-500"></div>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-30 transition-opacity duration-300" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="hidden fixed left-0 top-0 w-64 h-full bg-zinc-900 border-r border-zinc-800 z-40 flex flex-col overflow-y-auto">
      <div class="p-4 border-b border-zinc-800">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold">Guardian</h2>
          <button onclick="toggleSidebar()" class="text-zinc-500 hover:text-zinc-300 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <nav class="flex-1 px-2 py-4 space-y-2">
        <button onclick="showConversationsView(); toggleSidebar()" class="w-full text-left px-4 py-2 rounded-lg hover:bg-zinc-800 transition text-cyan-400 hover:text-cyan-300">
          <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
          Conversations
        </button>
        <button onclick="showContactsView(); toggleSidebar()" class="w-full text-left px-4 py-2 rounded-lg hover:bg-zinc-800 transition hover:text-cyan-300">
          <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 10a3 3 0 11-6 0 3 3 0 016 0zM6 20a9 9 0 0118 0v2h2v-2a11 11 0 10-20 0v2h2v-2z" />
          </svg>
          Contacts
        </button>
        <button onclick="showDiscoverView(); toggleSidebar()" class="w-full text-left px-4 py-2 rounded-lg hover:bg-zinc-800 transition hover:text-cyan-300">
          <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          Find Contacts
        </button>
      </nav>

      <div id="sidebarUser" class="p-4 border-t border-zinc-800">
        <div class="text-sm text-zinc-400">Logged in as</div>
        <div id="sidebarUsername" class="font-medium text-cyan-400 mt-1">Loading...</div>
        <div id="sidebarWallet" class="text-xs text-zinc-500 mt-1 break-all">Loading...</div>
      </div>
    </div>

    <!-- Main content -->
    <div id="content" class="flex-1 overflow-hidden flex flex-col">
      <!-- Conversations List (initial view) -->
      <div id="conversationsView" class="flex flex-col flex-1 overflow-hidden">
        <div id="convList" class="flex-1 overflow-y-auto divide-y divide-zinc-800">
          <div class="text-center py-8 text-zinc-500">Loading conversations...</div>
        </div>
        <div class="p-4 border-t border-zinc-800">
          <button onclick="showDiscoverView()" class="w-full px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition font-medium">Find contacts</button>
        </div>
      </div>

      <!-- Chat View -->
      <div id="chatView" class="hidden flex flex-col flex-1 overflow-hidden">
        <div id="messageList" class="flex-1 overflow-y-auto space-y-3 p-4"></div>
      </div>

      <!-- Contacts View -->
      <div id="contactsView" class="hidden flex flex-col flex-1 overflow-hidden">
        <div id="contactList" class="flex-1 overflow-y-auto divide-y divide-zinc-800">
          <div class="text-center py-8 text-zinc-500">Loading contacts...</div>
        </div>
        <div class="p-4 border-t border-zinc-800">
          <button onclick="showDiscoverView()" class="w-full px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition font-medium">Add contacts</button>
        </div>
      </div>

      <!-- Discover View -->
      <div id="discoverView" class="hidden flex flex-col flex-1 p-4 overflow-hidden">
        <input id="searchInput" type="text" placeholder="Search users..." class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 mb-4 transition">
        <div id="searchResults" class="flex-1 overflow-y-auto space-y-2"></div>
      </div>
    </div>

    <!-- Chat Input (shown only in chat view) -->
    <div id="inputFooter" class="hidden bg-zinc-900 border-t border-zinc-800 p-4 space-y-2">
      <div class="flex gap-2">
        <input id="msgInput" type="text" placeholder="Type a message..." class="flex-1 px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
        <button id="sendBtn" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition font-medium">Send</button>
      </div>
      <div class="flex gap-2">
        <button id="imageBtn" class="flex-1 px-2 py-2 bg-zinc-800 hover:bg-zinc-700 text-sm rounded-lg transition">📷 Image</button>
        <button id="tokenBtn" class="flex-1 px-2 py-2 bg-zinc-800 hover:bg-zinc-700 text-sm rounded-lg transition">💰 Token</button>
      </div>
    </div>

    <!-- Floating Action Button -->
    <button id="fabBtn" class="fixed bottom-6 right-6 w-14 h-14 bg-cyan-500 hover:bg-cyan-400 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-110 z-20" title="Discover new contacts" onclick="showDiscoverView()">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    </button>
  </div>

  <!-- Modals -->
  <!-- Image Lightbox -->
  <div id="imageLightbox" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
    <div class="relative max-w-2xl max-h-[90vh]">
      <img id="lightboxImage" src="" alt="Message image" class="max-w-full max-h-[90vh] rounded-lg">
      <button id="closeLightbox" class="absolute top-2 right-2 bg-black/50 hover:bg-black/70 text-white w-8 h-8 rounded-full flex items-center justify-center transition">✕</button>
    </div>
  </div>

  <!-- Token Transfer Modal -->
  <div id="tokenModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-6 w-full max-w-sm space-y-4">
      <h2 class="text-xl font-semibold">Send Tokens</h2>
      <div class="space-y-2">
        <label class="text-sm text-zinc-400">Recipient</label>
        <div id="tokenRecipient" class="px-3 py-2 bg-zinc-800 rounded-lg text-zinc-300"></div>
      </div>
      <div class="space-y-2">
        <label class="text-sm text-zinc-400">Amount</label>
        <input id="tokenAmount" type="number" placeholder="0" class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
      </div>
      <div class="space-y-2">
        <label class="text-sm text-zinc-400">Memo (optional)</label>
        <input id="tokenMemo" type="text" placeholder="Add a note..." class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
      </div>
      <div class="flex gap-2">
        <button id="tokenCancel" class="flex-1 px-3 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg transition">Cancel</button>
        <button id="tokenSend" class="flex-1 px-3 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition font-medium">Send</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const headers = token ? { 'x-usernode-token': token } : {};

    let currentUser = null;
    let currentConvId = null;
    let currentOtherId = null;
    let pollInterval = null;
    let sidebarOpen = false;
    let savedContactUserIds = new Set();

    async function apiCall(path, opts = {}) {
      const response = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...headers, ...opts.headers }
      });
      if (response.status === 401) {
        alert('Not authenticated');
        return null;
      }
      return response.ok ? response.json() : null;
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      if (sidebarOpen) {
        sidebar.classList.remove('hidden');
        overlay.classList.remove('hidden');
        setTimeout(() => {
          sidebar.classList.add('sidebar-enter');
          overlay.style.opacity = '1';
        }, 0);
      } else {
        sidebar.classList.add('sidebar-exit');
        overlay.style.opacity = '0';
        setTimeout(() => {
          sidebar.classList.add('hidden');
          overlay.classList.add('hidden');
          sidebar.classList.remove('sidebar-enter', 'sidebar-exit');
        }, 300);
      }
    }

    async function init() {
      const user = await apiCall('/api/user');
      if (!user) {
        console.error('Failed to load user');
        return;
      }
      currentUser = user;
      document.getElementById('sidebarUsername').textContent = user.username + (user.verified ? ' ✓' : '');
      document.getElementById('sidebarWallet').textContent = user.usernode_pubkey || 'No wallet linked';
      loadContacts();
      loadConversations();
      setupEventListeners();
    }

    function setupEventListeners() {
      document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
      document.getElementById('backBtn').addEventListener('click', () => {
        currentConvId = null;
        showConversationsView();
      });

      document.getElementById('searchInput').addEventListener('input', (e) => searchUsers(e.target.value));

      document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('imageBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => handleImageUpload(e.target.files[0]);
        input.click();
      });

      document.getElementById('tokenBtn').addEventListener('click', showTokenModal);
      document.getElementById('tokenCancel').addEventListener('click', hideTokenModal);
      document.getElementById('tokenSend').addEventListener('click', sendToken);

      document.getElementById('closeLightbox').addEventListener('click', () => {
        document.getElementById('imageLightbox').classList.add('hidden');
      });

      document.getElementById('imageLightbox').addEventListener('click', (e) => {
        if (e.target === document.getElementById('imageLightbox')) {
          document.getElementById('imageLightbox').classList.add('hidden');
        }
      });

      document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
    }

    async function loadConversations() {
      const data = await apiCall('/api/conversations');
      if (!data) return;

      const list = document.getElementById('convList');
      if (data.conversations.length === 0) {
        list.innerHTML = '<div class="text-center py-8 text-zinc-500">No conversations yet. <br>Tap the + button to discover contacts.</div>';
        return;
      }

      list.innerHTML = data.conversations.map(conv => `
        <div class="p-4 hover:bg-zinc-900 cursor-pointer transition" onclick="openConversation(${conv.id}, ${conv.otherId}, '${conv.username}')">
          <div class="flex justify-between items-start gap-2">
            <div class="flex-1 min-w-0">
              <div class="font-medium truncate">${conv.username} <span class="text-sm text-zinc-500">✓</span></div>
              <div class="text-xs text-zinc-500 truncate">${conv.usernode_pubkey || 'No wallet'}</div>
              <div class="text-sm text-zinc-400 truncate">${conv.lastMessage || 'No messages'}</div>
            </div>
            <div class="text-xs text-zinc-500 text-right flex-shrink-0">
              ${conv.lastMessageAt ? formatTime(new Date(conv.lastMessageAt)) : ''}
              ${conv.unreadCount > 0 ? `<div class="mt-1 inline-block px-2 py-0.5 bg-cyan-600 rounded-full text-white text-xs">${conv.unreadCount}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function loadContacts() {
      const data = await apiCall('/api/contacts');
      if (!data) return;

      savedContactUserIds.clear();
      data.contacts.forEach(c => savedContactUserIds.add(c.userId));

      const list = document.getElementById('contactList');
      if (data.contacts.length === 0) {
        list.innerHTML = '<div class="text-center py-8 text-zinc-500">No saved contacts yet.</div>';
        return;
      }

      list.innerHTML = data.contacts.map(contact => `
        <div class="p-4 hover:bg-zinc-900 transition">
          <div class="flex justify-between items-start gap-2">
            <div class="flex-1 min-w-0 cursor-pointer" onclick="startConversation(${contact.userId}, '${contact.username}')">
              <div class="font-medium truncate">${contact.username} ${contact.verified ? '✓' : ''}</div>
              <div class="text-xs text-zinc-500 truncate">${contact.usernode_pubkey || 'No wallet'}</div>
            </div>
            <button onclick="removeContact(${contact.id})" class="text-zinc-500 hover:text-red-400 transition text-sm px-2 py-1">Remove</button>
          </div>
        </div>
      `).join('');
    }

    async function addContact(userId) {
      const data = await apiCall('/api/contacts', {
        method: 'POST',
        body: JSON.stringify({ contactUserId: userId })
      });

      if (data) {
        savedContactUserIds.add(userId);
        updateSearchResultButtons();
      }
    }

    async function removeContact(contactId) {
      if (!confirm('Remove this contact?')) return;

      const data = await apiCall(`/api/contacts/${contactId}`, {
        method: 'DELETE'
      });

      if (data) {
        loadContacts();
      }
    }

    function updateSearchResultButtons() {
      document.querySelectorAll('[data-user-id]').forEach(el => {
        const userId = parseInt(el.getAttribute('data-user-id'));
        const btn = el.querySelector('[data-contact-btn]');
        if (btn) {
          if (savedContactUserIds.has(userId)) {
            btn.textContent = '✓ Saved';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-default');
          } else {
            btn.textContent = 'Add Contact';
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-default');
          }
        }
      });
    }

    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return 'now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
      return Math.floor(diff / 86400000) + 'd';
    }

    async function openConversation(convId, otherId, username) {
      currentConvId = convId;
      currentOtherId = otherId;
      document.getElementById('headerTitle').textContent = username + ' ✓';
      document.getElementById('backBtn').classList.remove('hidden');
      document.getElementById('menuBtn').classList.add('hidden');
      showChatView();
      loadMessages();

      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!currentConvId) return;
      const data = await apiCall(`/api/conversations/${currentConvId}?limit=50`);
      if (!data) return;

      const list = document.getElementById('messageList');
      if (data.messages.length === 0) {
        list.innerHTML = '<div class="text-center text-zinc-500 py-4">No messages yet</div>';
        return;
      }

      list.innerHTML = data.messages.map(msg => renderMessage(msg)).join('');
      list.scrollTop = list.scrollHeight;

      await apiCall(`/api/conversations/${currentConvId}/read`, {
        method: 'PUT',
        body: JSON.stringify({ readUpTo: new Date().toISOString() })
      });
    }

    function renderMessage(msg) {
      const isOwn = msg.senderId === currentUser.id;
      const baseClass = isOwn ? 'ml-auto bg-cyan-600 text-white' : 'mr-auto bg-zinc-800 text-zinc-100';
      const alignClass = isOwn ? 'justify-end' : 'justify-start';

      if (msg.type === 'text') {
        return `
          <div class="flex ${alignClass}">
            <div class="max-w-xs px-4 py-2 rounded-2xl ${baseClass} message-bubble">
              <div class="text-xs text-zinc-300 mb-1 opacity-80">${msg.senderUsername}</div>
              <div>${msg.content.text}</div>
              <div class="text-xs mt-2 opacity-70">${formatTime(new Date(msg.createdAt))}</div>
            </div>
          </div>
        `;
      }

      if (msg.type === 'image') {
        return `
          <div class="flex ${alignClass}">
            <div class="max-w-xs rounded-2xl overflow-hidden ${baseClass}">
              <img src="${msg.content.imageUrl}" alt="Message image" class="max-w-xs cursor-pointer hover:opacity-80 transition" onclick="showLightbox('${msg.content.imageUrl}')">
              <div class="text-xs text-zinc-300 px-4 py-2 opacity-80">${msg.senderUsername}</div>
            </div>
          </div>
        `;
      }

      if (msg.type === 'token') {
        const c = msg.content;
        return `
          <div class="flex ${alignClass}">
            <div class="max-w-xs px-4 py-2 rounded-2xl ${baseClass} border-2 border-yellow-500/40 message-bubble">
              <div class="text-xs text-zinc-300 mb-1">💰 Token Transfer</div>
              <div class="font-bold text-lg">${c.amount} tokens</div>
              <div class="text-xs text-zinc-300 mt-1">${c.memo || 'No memo'}</div>
              <div class="text-xs mt-2 font-medium">${c.status === 'confirmed' ? '✓ Confirmed' : '⏳ Pending'}</div>
              <div class="text-xs mt-1 opacity-70">${formatTime(new Date(msg.createdAt))}</div>
            </div>
          </div>
        `;
      }

      return '';
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !currentConvId) return;

      input.value = '';
      const data = await apiCall(`/api/conversations/${currentConvId}/messages`, {
        method: 'POST',
        body: JSON.stringify({ type: 'text', content: { text } })
      });

      if (data) {
        loadMessages();
      }
    }

    async function handleImageUpload(file) {
      if (!file || !currentConvId) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const dataUri = e.target.result;
        const data = await apiCall(`/api/conversations/${currentConvId}/messages`, {
          method: 'POST',
          body: JSON.stringify({ type: 'image', content: { imageUrl: dataUri } })
        });
        if (data) loadMessages();
      };
      reader.readAsDataURL(file);
    }

    function showTokenModal() {
      apiCall(`/api/users/${currentOtherId}`).then(u => {
        document.getElementById('tokenRecipient').textContent = u ? u.username : 'Unknown';
      });
      document.getElementById('tokenModal').classList.remove('hidden');
    }

    function hideTokenModal() {
      document.getElementById('tokenModal').classList.add('hidden');
      document.getElementById('tokenAmount').value = '';
      document.getElementById('tokenMemo').value = '';
    }

    async function sendToken() {
      const amount = document.getElementById('tokenAmount').value;
      if (!amount || !currentConvId || !currentOtherId) return;

      const data = await apiCall('/api/tokens/send', {
        method: 'POST',
        body: JSON.stringify({ recipientId: currentOtherId, amount: parseInt(amount), memo: document.getElementById('tokenMemo').value })
      });

      if (data) {
        await apiCall(`/api/conversations/${currentConvId}/messages`, {
          method: 'POST',
          body: JSON.stringify({
            type: 'token',
            content: { recipientId: currentOtherId, amount: parseInt(amount), memo: document.getElementById('tokenMemo').value, txHash: data.txHash, status: data.status }
          })
        });
        hideTokenModal();
        loadMessages();
      }
    }

    function showLightbox(imageUrl) {
      document.getElementById('lightboxImage').src = imageUrl;
      document.getElementById('imageLightbox').classList.remove('hidden');
    }

    async function searchUsers(query) {
      if (!query.trim()) {
        document.getElementById('searchResults').innerHTML = '';
        return;
      }

      const data = await apiCall(`/api/search/users?q=${encodeURIComponent(query)}`);
      if (!data) return;

      const results = document.getElementById('searchResults');
      if (data.users.length === 0) {
        results.innerHTML = '<div class="text-center text-zinc-500 py-4">No users found</div>';
        return;
      }

      results.innerHTML = data.users.map(user => `
        <div class="p-4 bg-zinc-800 rounded-lg hover:bg-zinc-700 transition" data-user-id="${user.id}">
          <div class="flex justify-between items-start gap-2">
            <div class="flex-1 min-w-0 cursor-pointer" onclick="startConversation(${user.id}, '${user.username}')">
              <div class="font-medium text-cyan-400">${user.username} ${user.verified ? '✓' : ''}</div>
              <div class="text-xs text-zinc-500 mt-1">${user.usernode_pubkey || 'No wallet'}</div>
              <div class="text-sm text-zinc-400 mt-1">${user.mutualCount} mutual connections</div>
            </div>
            <button data-contact-btn onclick="addContact(${user.id}); event.stopPropagation();" class="px-3 py-1 bg-cyan-600 hover:bg-cyan-500 text-white text-sm rounded-lg transition flex-shrink-0">${savedContactUserIds.has(user.id) ? '✓ Saved' : 'Add Contact'}</button>
          </div>
        </div>
      `).join('');
      updateSearchResultButtons();
    }

    async function startConversation(userId, username) {
      const data = await apiCall('/api/conversations', {
        method: 'POST',
        body: JSON.stringify({ participantId: userId })
      });

      if (data) {
        openConversation(data.id, userId, username);
      }
    }

    function showConversationsView() {
      document.getElementById('conversationsView').classList.remove('hidden');
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('contactsView').classList.add('hidden');
      document.getElementById('discoverView').classList.add('hidden');
      document.getElementById('inputFooter').classList.add('hidden');
      document.getElementById('headerTitle').textContent = 'Guardian';
      document.getElementById('backBtn').classList.add('hidden');
      document.getElementById('menuBtn').classList.remove('hidden');
      document.getElementById('fabBtn').classList.remove('hidden');
      if (pollInterval) clearInterval(pollInterval);
      loadConversations();
    }

    function showContactsView() {
      document.getElementById('conversationsView').classList.add('hidden');
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('contactsView').classList.remove('hidden');
      document.getElementById('discoverView').classList.add('hidden');
      document.getElementById('inputFooter').classList.add('hidden');
      document.getElementById('headerTitle').textContent = 'Contacts';
      document.getElementById('backBtn').classList.add('hidden');
      document.getElementById('menuBtn').classList.remove('hidden');
      document.getElementById('fabBtn').classList.remove('hidden');
      if (pollInterval) clearInterval(pollInterval);
      loadContacts();
    }

    function showChatView() {
      document.getElementById('conversationsView').classList.add('hidden');
      document.getElementById('chatView').classList.remove('hidden');
      document.getElementById('contactsView').classList.add('hidden');
      document.getElementById('discoverView').classList.add('hidden');
      document.getElementById('inputFooter').classList.remove('hidden');
      document.getElementById('fabBtn').classList.add('hidden');
    }

    function showDiscoverView() {
      document.getElementById('conversationsView').classList.add('hidden');
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('contactsView').classList.add('hidden');
      document.getElementById('discoverView').classList.remove('hidden');
      document.getElementById('inputFooter').classList.add('hidden');
      document.getElementById('headerTitle').textContent = 'Find contacts';
      document.getElementById('backBtn').classList.remove('hidden');
      document.getElementById('menuBtn').classList.add('hidden');
      document.getElementById('fabBtn').classList.add('hidden');
      document.getElementById('searchInput').focus();
    }

    init();
  </script>
</body>
</html>
